body:
  text: 海東沙門天頙撰君臣崇信門三十九則尼婆附西天異見王輕毀三寶問波羅提尊者曰何者是佛答見性是佛王曰師見性否曰我見佛性云性在何處曰性在作用云是何作用我今不見曰今現作用王自不見云於我有否曰王若作用無有不是王若不用體亦難見云若當用時幾處出現曰若出現時當有其八云其八出現當為我說波羅提即說偈曰在胎為身處世名人在眼曰見在耳曰聞在鼻辨香在舌談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂王聞偈已心即開悟傳燈録魏明帝問天竺三藏迦摩羅陀曰佛經之中何經歸依君國有益三藏答曰此地不是經法之處帝問是何所由藏曰不遠年間我師般若多羅同學菩提達摩降至此國傳佛心印之處所以經法不行帝問漢帝已來大藏東流中寄十二部經之外何有佛心法印藏曰本師釋迦王宮誕生長而十九觀之藏中寄十二部經未契祖師之宗遠至雪山遊行十二年紀求尋祖院傳得心印之法於後雪山成道普光殿說及於七處八會不及心印之法所以經律論別外之道昔時天子遺經教法信受奉行作小國王呼為八萬也天子今時特行佛心禪法合諸小國或作大朝天子呼為十二國帝乃信受魏明帝所問諸經篇梁武帝問達磨朕即位已來造寺寫經度僧不可勝數有何功德師曰並無功德帝曰何以無功德師曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德師曰淨智妙圓體自空寂如是功德不以世求帝後製達磨云見之不見逢之不逢古之今之悔之恨之傳燈及達磨西竺中印度國王迦勝崇信外道值難于第二十五祖婆舍斯多曰餘國素絶妖訛師所傳者當是何宗祖曰王國昔來實無邪法我所得者即是佛宗王曰佛滅已千二百載師從誰得耶祖曰飲光大士親受佛印展轉至二十四世師子尊者我從彼得王曰師子比丘不能免於刑戮何能傳法後人祖曰我師難未起時密授我信衣法偈以現師承王曰其衣何在祖即於囊中出衣示王王命焚之五色相鮮薪盡如故王即追悔致禮傳燈録唐憲宗嘗詔大義禪師入內師舉順宗問尸利禪師大地衆生如何得見性成佛尸利云佛性猶如水中月可見不可取因謂帝云佛性非見必見水中月如何攫取帝乃問何者是佛性師對云不離陛下所問帝默契真宗益加欽重傳燈録唐宣宗問弘辨禪師禪宗何有南北之名師對曰昔如來以正法眼付大迦葉展轉至二十八祖菩提達磨來遊此方為初祖洎第五祖忍大師時有二弟子一名惠能受衣法居嶺南一名神秀在北揚化其所得法雖一而開導發悟有頓漸之異故曰南頓北漸非禪宗本有南北之號也帝曰何為佛心師曰佛者西天之語唐言覺謂人有智慧覺照為佛心心者佛之別名有百千異號體唯有一如陛下日應萬機即是陛下佛心帝賜紫方袍號圓智禪師傳燈録同光帝問興化存獎禪師朕收中原獲一寶而未有人酬價化云略借陛下寶看帝乃以兩手引幞頭腳示之化云君王之寶誰敢酬價帝大悅傳燈録宋真宗皇帝臨御已來探索祖教曉然自得嘗製偈曰寂寂大虗空淡淡如秋水拂拭本無塵不屬張王李普燈録宋仁宗皇帝嘗製修心頌曰初祖安禪在少林不傳經教但傳心後人若悟真如性密印由來妙理深普燈録宋高宗皇帝詔圓悟禪師至關下上曰朕亦知師禪道高妙可得聞乎勤云陛下以仁孝理天下率土生靈咸被光澤雖草木昆蟲各得其所此佛祖所傳之心也此心之外無別有心若別有心非佛祖之心矣上大喜曰可賜圓悟禪師號普燈録宋孝宗皇帝詔僧惠遠住持靈隱禪寺上舉不與萬法為侶者問遠是什麼人語遠以龐居士奏之上曰前日靜坐忽思向所舉不與萬法為侶因緣朕從這裏有箇見處遠曰不與萬法為侶陛下作麼生會上曰四海不為多遠云一口吸盡西江水又且如何上曰亦未曾缺缺又賜佛照禪師手詔曰今俗人乃以禪為虗空以語為戲論其不知道也如此茲事至大豈在筆下可窮聊敘所得耳普燈録及寶鑑録高麗太祖神聖大王崇信禪法自製與法王師云蓋聞微言立教始開鷲嶺之談妙旨傳心終入雞山之定雖云別行法眼竊惟同稟玄精慶喜於是當仁和修以甚嗣位云云初聞圓覺東入梁朝始見大彈北遊魏室於是師資所契付囑同風祖法相承心燈不絶所以一花歘現六葉重榮近自江西流於海裔亦有鳳林家子章敬曾孫惟我大師再揚吾道者焉云云世宗之遇摩騰梁武之逢寶志無以加也生生世世永修香火之因子子孫孫終表奉持之至所以重起其興法禪院以住持云云因創五百禪院海東興法寺期城太守楊衒之問達磨大師西天五印師承為祖其道如何祖曰明佛心宗寸無差誤行解相應名之曰祖又問此外如何祖曰須明他心知其古今不猒有無於法無取不賢不愚無迷無悟若能是解故稱為祖即說偈曰亦不覩惡而生嫌亦不觀善而勤措亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同躔超然名之曰祖傳燈録唐韓文公愈為潮州刺使時問大顛和尚弟子軍州事多省要處乞師一句師良久文公罔措三平為侍者乃敲床三下師云作麼平云先以定動後以智拔公乃禮謝三平云和尚門風高峻弟子於侍者邊得介入處傳燈録裴休相國一日入開元寺見壁間𦘕相問院主云壁間是什麼主云高僧裴云形儀可觀高僧在什麼處主無語裴云這裏莫有禪僧麼主云有一希運上座頗似禪僧裴遂召師來舉前話似之師召相公公應喏師云在什麼處裴於言下領旨傳燈録朗州刺使李翱問藥山和尚如何是道師以手指上下曰會麼云不會師曰雲在青天水在瓶翱乃呈偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘說雲在青天水在瓶傳燈録王常侍來參睦州州問曰今日何故入院遲侍曰看馬打毬師曰人困麼曰困馬困麼曰困露柱困麼侍茫然無對歸至私第中夜間忽然省得明日見師云某會得昨日事也師曰露柱困麼侍曰困師遂許之傳燈録龐居士蘊初參石頭忘言會旨一日頭問曰子見老僧已來日用事作麼生對曰若問日用事即無開口處復呈一偈云日用事無別唯吾自偶諧頭頭非取捨處處勿張乖朱紫誰為號丘山絶點瑕神通并妙用運水及般柴頭然之後之江西參問馬祖云不與萬法為侶者是什麼人祖云待汝一口吸盡西江水即向汝道居士言下領旨有偈曰有男不婚有女不嫁大家團圝頭共說無生話傳燈録張拙秀才因訪石霜霜問曰公何姓曰姓張曰何名曰名拙霜曰覓巧了不可得拙自何來公於言下有省乃述悟道頌曰光明寂照遍河沙凡聖含靈共我家一念不生全體現六根才動被雲遮斷除煩惱重增病趣向菩提亦是邪隨順衆緣無𦊱礙涅槃生死是空花祖庭録范文粹居士久參南陽襲燈禪師未有悟入一日聞漁笛忽悟次日呈投機偈曰香嚴和尚大慈悲悟我真乘破宿疑寶藏金文五千軸夜來都向笛中吹五燈會元大史黃庭堅往依晦堂心禪師乞指徑捷處心曰仲尼道二三子以我為隱乎吾無隱乎爾大史如何理論公擬對心曰不是不是公迷悶不已一日侍心山行巖桂盛放心曰聞木蘭花香麼公云聞心云吾無隱乎爾公遂釋然即拜之云和尚得恁麼老婆心切心笑曰只要公到家耳後晦堂訃音至公拈香云海風吹落楞伽山四海禪流著眼看一把柳條收不得和風搭在玉欄干普燈録內翰蘇軾宿東林日與照覺總禪師論無情話有省黎明獻偈曰溪聲便是廣長舌山色豈非清淨身夜來四萬八千偈他日如何舉似人普燈録張天覺無盡居士因兜率悅和尚舉德山托鉢話令熟究之公悵然不寐至五鼓忽垂腳翻尿器猛省翌旦投偈曰鼓寂鍾沈托鉢回巖頭一拶語如雷果然只得三年活莫是遭他授記來悅首肯普燈録左丞范冲謁圓通旻禪師曰某宿世作何福業今生墮在金紫囊中去此事稍遠旻呼內翰公應喏旻曰何遠之有公躍然曰再乞師指誨旻拊膝一下公豁如普燈録中丞盧航與旻禪師擁爐次公問直截一句請師指示旻厲聲揖曰看火公撥衣忽大悟謝曰元來佛法無多子旻喝曰放下著公應喏喏普燈録侍郎張九成一日如廁以柏樹子話究之聞蛙鳴釋然契入有偈曰春天月夜一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭腳痛有玄沙普燈録禮部侍郎楊傑歷參諸名德晚從天衣遊衣每引老龐機語研究深造後奉祠泰山雞一鳴覩日如盤湧忽大悟因以有男不婚有女不嫁之語別曰男大須婚女長須嫁討甚間功夫更說無生話辭世偈曰無一可戀無一可捨大虗空中之乎者也將錯就錯西方極樂普燈録楊文公億謁廣惠璉禪師夜語次公問兩個大蟲相咬時如何璉以手作曳鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裏走金毛師子變作狗擬欲藏身北斗中應須合掌南辰後普燈録清獻公趙抃嘗典清州政事之暇多宴坐忽大雷震驚即契悟作頌曰默坐公堂虗隱機心源不動湛如水一聲霹靂頂門開喚起從前自家底普燈録歐陽修字永叔號六一居士公慕韓退之將排釋教文未成一日謁浮山遠禪師心有異之從而與客奕碁遠坐其傍公遽收局請因碁說法遠撾鼓升堂乃曰若論此事如兩家著碁相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底只解閉門作活不解奪角充關硬節與虎口齊彰局破後徒勞運斡所以道肥邊易得瘦肚難尋思行則往往失粘粗心而時時頭撞休誇國手謾說神仙贏局輸籌即不問且道黑白未分時一著落在什麼處良久云從前十九路迷悟幾多人公嘉嘆久之從容謂同僚曰修初疑禪語為虗誕為記憶胸中以誘其流俗今見此老機緣所得所造非悟明於心地安能有此妙旨哉公於禪宗默有所契禪苑聯芳丞相王隨居士嘗謁首山省念禪師得言外之旨自爾踐履益深竟明大法至臨終日書偈曰𦘕堂燈已滅彈指向誰說去住本尋常春風掃殘雪禪苑聯芳曾學士會字同之幼與雪竇顯禪師同舍及冠異途顯祝髮為僧公擢科第一日會于景德寺公遂引中庸大學參以楞嚴符宗門語句質顯顯曰這個尚不與教乘合況中庸大學乎學士要徑捷理會此事乃彈指一下但恁麼薦取公於言下領旨禪苑聯芳海東清平山真樂公李資玄居士看雪峰語録至曰盡乾坤是沙門一隻眼汝向什麼處蹲坐公於言下豁然大悟重修文殊院記尼婆三則無著道人尼妙總年三十許厭世浮休脫去緣飾咨參諸老已入正信作夏徑山大惠升堂次舉藥山初參石頭後見馬祖因緣總聞豁然省悟惠復舉巖頭婆子話問之總答偈曰一葉扁舟泛渺茫呈橈舞棹別宮商雲山海月都拋却贏得莊周媟夢長普燈録范縣君夫人號寂壽道人在城都參佛果果教渠看不是心不是佛不是物是什麼不得下語不得開口看來看去無入頭便覺悽惶乃問佛果云此外有何方便令某甲會去果云有個方便不是心不是佛不是物壽於此有省乃云元來得恁麼近宗門武庫俞道婆金陵女也市油糍為業常隨衆參問琅瑘瑘以臨濟無位真人話示之一日聞丐者唱蓮華樂云不因柳毅傳書信何緣得到洞庭湖忽有省以糍盤地投夫傍睨云你顛耶婆掌曰非汝境界往見琅瑘瑘望之知其造詣問那個是無位真人婆應聲曰有一無位人六臂三頭努力嗔一擘華山分兩路萬年流水不知春普燈録嘉靖十年辛卯日慶尚道晉州地智異山鐵窟開刊以傳園興寺詳夫禪是佛心教是佛語心傳而棒喝作語漲而頓漸興然一大藏教無非指月之指故利根者師子咬人鈍根者韓獹逐塊於噫咬人者寡逐塊者衆遂成兩途彼此相排斯乃在人非關於法一宿覺云從他謗任他非把火燒天徒自疲正謂此也今內願堂燕谷住老呆庵大禪翁悼禪風之將墜悲人我之相高採托古今對辨決疑之語與夫君臣崇而理國諸講伏而見性許多則分為三門目之曰禪門寶藏鋟梓流傳欲作將來之益則豈小補哉其有有眼箇漢若能見月忘指則此一卷文亦是眼中金屑也無著處至元三十一年甲午三月日蒙菴居士奉翊大夫副知密直司事國學大司成文翰學士承旨李混跋
