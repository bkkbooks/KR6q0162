body:
  text: 海東沙門天頙撰諸講歸伏門二十五則西山亮座主講得二十四本經論一日去訪馬祖祖問曰聞説大德甚講得經論將什麼講主云將心講祖曰心如工伎兒意如和伎者爭解講得經論主云心既講不得莫是虗空講得麼祖曰却是虗空講得主拂袖而出祖召座主主回首祖云是什麼主於是大悟便伸禮謝歸寺謂衆曰我一生功夫將謂無人過得今日被馬祖一問平生功夫氷釋而已傳燈録壽州良遂座主初參麻谷谷見來乃將鋤頭去鋤草主到鋤草處谷都不顧便歸方丈閉却門主却來敲門谷曰阿誰主曰良遂才稱名忽爾契悟曰和尚莫謾良遂良遂若不來禮拜和尚洎被經論賺過一生及歸講肆云諸人知處良遂總知良遂知處諸人不知傳燈録太原孚為座主時在楊州孝先寺講涅槃經有禪者阻雪聽講至廣談法身妙理禪者失笑孚云某甲依經解義適蒙見笑且望見教禪者云實笑座主不識法身孚云何處不是禪者云請座主更説一遍孚云法身之理猶若大虗竪窮三際橫亘十方隨緣赴感靡不周遍禪者云不道座主説不是只説得法身量邊事實未識法身在孚曰請禪客當為我説禪者曰暫輟講於夜中靜慮善惡諸緣一時放却孚依教從初夜至五更聞鼓角聲忽然契悟傳燈録印宗法師於法性寺講涅槃經能大師寓止廊廡間暮夜風揚剎幡聞二僧對論一云幡動一云風動往復酬答曾未契理師直以風幡非動動自心耳印宗竊聆此語悚然異之翌日邀師入室徵風幡之義師具以理告之印宗執弟子之禮請受禪要傳燈録無業禪師為涅槃座主之時問馬大師三乘文字粗窮其旨常聞禪門即心是佛實未能了祖曰只未了底心即是更無別物又問如何是祖師西來密傳心印祖曰大德正閙在且去別時來師才出祖召曰大德師回首祖云是甚麼師便領悟禮拜傳燈録洪州法達師來禮六祖頭不至地祖呵曰禮不投地何如不禮汝心中必有一物蘊習何事耶達曰念法華經已及三千部祖云汝但勞勞執念謂為功課者何異犛牛愛尾也聽吾偈云心迷法華轉心悟轉法華誦久不明己與義作讎家無念念即正有念念成邪有無俱不計長御白牛車達蒙啓發踊躍歡喜以偈讚云經誦三千部曹溪一句亡未明出世旨寧歇纍生狂羊鹿牛權設初中後善揚誰知火宅內元是法中王傳燈録清涼鎮國國師澄觀九歲出家禮寶林體真禪師周歲通法華維摩楞伽等經次到常照和尚傳菩薩戒奮十願律身雖行解兼至猶疑礙未通遂扣宗門首謁牛頭六祖次見徑山國一時無名禪師居東都同德寺師趨其函丈親炙茲事頓徹玄微洞明大事述心要一章云至道本乎其心心法本乎無住云祖燈録花嚴院僧繼宗問雲居智禪師見性成佛其義云何師曰清淨之性本來湛然無有動搖不屬有無淨穢長短取捨體自翛然如是明見乃名見性性即佛佛即性故云見性成佛僧曰性既清淨不屬有無因何有見師曰見無所見僧曰無所見因何更有見師曰見處亦無僧曰如是見時是誰之見師曰無有能見者僧曰究竟其理如何師曰汝知否妄計為有即有能所乃得名迷隨見生解便墮生死明見之人即不然終日見未嘗見求見處體性不可得能所俱絶名為見性僧曰至理如何師曰我以要言之清淨性中無有凡聖亦無了人不了人二俱假名若云我能了彼不能了即是大病見有淨穢凡聖亦是大病作無凡聖解又屬撥無因果見有清淨性可棲止亦大病作不棲止解亦大病然清淨性中雖無動搖俱不壞方便應用及興慈運悲如是興運之處即全清淨之性可謂見性成佛矣繼宗踊躍禮謝而退傳燈録講花嚴僧來參鹽官齊安禪師師問經中有幾種法界僧云略説四種廣説則重重無盡師竪起拂子云這箇是第幾種法界中收僧良久師云思而知慮而解是鬼窟裏活計日下孤燈果然失照出去傳燈録有西蜀首座至白馬舉華嚴教問曰一塵含法界時如何馬曰如鳥二翼如車二輪座曰將謂禪門別有奇特元來不出教意乃還里中尋嚮夾山會禪師道化遂遣弟子持前語問之山曰雕沙無鏤玉之談結草乖道人之思弟子回舉似其師乃伏膺禪道參問玄旨祖庭録有小師洪諲以講論自矜鑑宗禪師謂之曰佛祖正法直截忘詮汝算海沙於理何益但能莫存知見泯絶外緣離一切心即汝真性諲聞茫然禮辭遊方至溈山方悟玄旨傳燈録有一講僧來問馬祖未審禪宗傳持何法師却問云座主傳持何法彼云忝講得經論二十餘本師云莫是師子兒否云不敢師作噓噓聲彼云此是法師云是甚麼法云師子出窟法師乃默然彼云此亦是法師云是什麼法云師子在窟法師云不出不入是什麼法僧無對傳燈録有一法師問大義禪師欲界無禪禪居色界此土憑何而立禪師云法師只知欲界無禪不知禪界無欲法師云如何是禪師以手點空法師無對傳燈録有律師法明謂大珠禪師曰禪師家多落空師曰却是座主家多落空法明大驚曰何得落空師曰經論是紙墨文字紙墨文字者俱空設於聲上建立名句等法無非是空座主執滯教體豈不落空法明曰禪師落空否師曰不落空曰何却不落空師曰文字等皆從智惠而生大用現前那得落空法明雖省過而心猶憤然又問曰夫經律論是佛語讀誦依教奉行何故不見性師曰如狂狗趂塊師子咬人法明禮謝讚嘆而退傳燈大珠禪師問答五則源律師問禪師當談即心是佛無有是處且一地菩薩分身百佛世界二地菩薩增于十倍禪師試現神通看師曰闍梨自己是凡是聖曰是凡師曰既是凡僧能問如是境界律師杜口講華嚴志座主問禪師何故不許青青翠竹盡是真如鬱鬱黃花無非般若師曰法身無像應翠竹以成形般若無知對黃花而現相非彼黃花翠竹而有般若法身座主會麼曰不了此意師曰若見性人道是亦得道不是亦得隨用而説不滯是非若不見性人説翠竹著翠竹説黃花著黃花説法身滯法身説般若不識般若所以皆成諍論志禮謝而去有法師問師説何法度人師曰貧道未曾有一法度人曰禪師家渾如此師却問云大德説何法度人曰講金剛般若經師曰此經是阿誰説僧抗聲曰禪師相弄豈不知是佛説耶師曰若言如來有所説法即為謗佛若言此經不是佛説即是謗經請大德説看僧無對良久又問如何得大涅槃師曰不造生死業曰如何是生死業師曰求大涅槃是生死業捨垢取淨是生死業有得有證是生死業不脫對治門是生死業曰云何即得解脫師曰本自無縛何用求解直用直行是無等等僧曰如和尚者實為希有禮謝而去有三藏法師問真如有變易否師曰有變易曰禪師錯也師却問三藏有真如否曰有師云若無變易三藏決定是凡僧也藏云若爾者真如即有變易師曰若執真如有變易亦是外道曰禪師適來説真如有變易如今又道不變易如何即是的當師曰若了了見性者如摩尼珠現色説變亦得説不變亦得若不見性人聞説真如變便作變解聞説不變便作不變解藏云故知南宗實不可測德山宣鑑禪師為座主時在西蜀講金剛經因教中道金剛喻定後得智中千劫學佛威儀萬劫學佛化行然後成佛他南方便説即心是佛遂發憤擔疏鈔行腳直往南方破這魔子輩初到澧州路上見一婆賣油糍遂放下疏鈔買作點心喫婆云所載者是什麼物山云金剛經疏鈔婆云我有一問你若答得布施油糍作點心若答不得別處買去山云但問婆云金剛經云過去心不可得現在心不可得未來心不可得上座欲點那箇心山無語婆遂指令參龍潭才跨門便問久嚮龍潭及乎到來潭又不見龍又不現潭云子親到龍潭山乃設禮而退遂取疏鈔於法堂前將火炬舉起云窮諸玄辨若一毫置於大虗竭世樞機似一滴投於巨壑遂燒之碧巖録仰山行偉禪師為賢首教座主時所至禪林盛籍籍聞宗師名心怪之見昔同學法亮投禪因問曰汝今稱禪者禪宗奧義語我來亮曰待我死後為汝敷説偉曰狂耶亮曰我狂方息汝今方熾即趨去偉謂其屬曰亮今甘爾禪家必有長處乃獨行謁南禪師依止二年每造室南公必斂目良久偉曰見行偉必合眼何耶南曰麻谷見良遂來荷鋤鋤草良遂有悟處我見汝來但間閉目汝雖無悟然且有疑尚亦可在偉滋不曉將治行而西夜與一僧同侍座僧問法華經云得解一切衆生語言陀羅尼何等語是陀羅尼南公顧香爐僧引手候火有無無火又就添以炷乃依位而立南公笑曰是此陀羅尼偉驚喜進曰如何解南公令僧且去僧揭簾趨出南公曰若不解爭能恁麼偉方有省僧寶傳法雲圓通法秀禪師為華嚴座主時云吾不信世尊教外別以法私大迦葉乃罷講南遊謂同學曰吾將詣其窟穴摟取其種類抹殺之以報佛恩乃已耳初至隱州護國讀淨果禪師碣曰僧問報慈如何是佛性慈曰誰無又問淨果果曰誰有其僧因有悟秀大笑云豈佛性敢有無之矧又云因以有悟哉其氣拂膺去至無為鐵佛謁懷禪師甚易之懷問座主講何經秀曰華嚴經又問此經以何為宗秀云以心為宗又問心以何為宗秀不能對懷曰毫𨤲有差天地懸隔汝當自看當有發明後日夜聞二僧舉論白兆問報慈情未生時如何慈曰隔忽大悟僧寶傳吳中講僧多譏祖師傳法偈無譯人禪者與辨失其真適足以重其謗達觀頴禪師諭之云此達磨為二祖言者也何須譯人耶如梁武帝問如何是聖諦第一義曰廓然無聖云對朕者誰曰不識使達磨不通方言則何於是時便能爾耶講僧不敢復有辭祖燈録有善華嚴者問繼成禪師曰吾佛設教自小乘至於圓頓掃除空有獨證真常然後萬德莊嚴方名為佛嘗聞禪宗一喝能轉凡成聖則與諸經論似相違背今一喝若能入吾宗五教是為正説若不能入是為邪説師召善善應喏師曰法師所謂小乘教者乃有義也大乘始教者乃無義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空義也如我一喝非唯能入五教至於工巧伎藝諸子百家悉皆能入師振聲喝一喝問善曰聞麼云聞曰汝既聞此一喝是有能入小乘教須臾又問善曰聞麼云不聞適來一喝是無能入始教遂顧善曰我初一喝汝既道有喝久聲消汝復道無道無則元初實有道有則而今實無不有不無能入終教我有一喝之時非有是有因無故有無一喝之時非無是無因有故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱亡道有之時纖塵不立道無之時橫遍虗空即此一喝入百千萬億喝百千萬億喝入此一喝是故能入圓教善乃起再拜師復謂曰非唯一喝為然乃至語默動靜一切時一切處一切事一切物契理契機周遍無餘於此一喝中悉皆具足此猶是建化門𨓍隨機方便謂之小歇場未至寶所殊不知吾祖師門下以心傳心不立文字見性成佛有千聖不傳底向上一路在善又問如何是一路師曰汝且向下會取善云如何是寶所師曰非汝境界善曰望禪師慈悲師曰任從滄海變終不為君通善膠口而退五燈會元西蜀鑾法師問佛照禪師禪家言多不根何也照曰汝習何經論曰諸經粗知頗通百法照曰只如昨日雨今日晴是什麼法中收師懵然照舉癢和子擊云莫道禪家所言不根好師憤曰昨日雨今日晴畢竟是什麼法中收照曰第二十四時分不相應法中收師恍悟即禮謝普燈録智遠僧統問道義國師云華嚴四種法界外更有何等法界五十五善知識行布法門外更有何等法門即此教以外謂別有祖師禪道云者乎道義答曰如僧統所舉四種法界則於祖師門下直舉正當理體氷消一切之正理拳中法界之相尚不可得於本無行智祖師心禪中文殊普賢之相尚不可見五十五知識行布法門正如水中泡耳四智菩提等道亦猶金之礦耳則諸教內混雜不得故唐朝歸宗和尚對一大藏明得箇什麼之問但舉拳頭智遠又問然則教理行信解修證於何定當何等佛果得成就乎義答曰無念無修理性信解修證耳祖宗示法佛衆生不可得道性直現耳故五教以外別傳祖師心印法耳所以現佛形像者為對難解祖師正理之機借現方便身耳縱多年傳讀佛經以此欲證心印法終劫難得耳智遠起禮曰素來暫聞佛莊嚴教訓耳佛心印法窺不得來乃投師禮謁云海東七代録
