body:
  text: 海東沙門天頙撰禪教對辨門二十五則盧舍那佛菩提樹下初成正覺以心傳心不立文字令諸大眾頓證頓悟唯迦葉上座入秘密難思之地文殊普賢等八萬菩薩眾海未識迦葉入處本生經梵王至靈山會上以金色波羅花獻佛捨身為床座請佛為群生說法世尊登座拈花示眾人天百萬億眾悉皆罔措獨迦葉破顏微笑世尊云吾有正法眼藏涅槃妙心分付摩訶迦葉大梵天王問佛決疑經海上由風轉種種波浪起出世觀緣故分別演三千海底極深故風影所不到如來心境界澹然無有畔嶺南宗道者注云波浪者喻現佛之教海隨機樂欲五千教典之詮海底者比如海底極深不是風影之所動三劫之風不到其底我佛深趣亦復如是深之最深玄之又玄意不可思言不可議般若多羅海底宗影示玄記唐土第二祖惠可大師問達磨今付正法即不問釋祖傳何人得何處慈悲曲說後來成規達磨曰我即五天竺諸祖傳說有篇而今為汝說示頌曰真歸祖師在雪山叢木房中待釋迦傳持祖印壬午歲心得同時祖宗旨達磨密錄唐土第六祖惠能大士因有僧從幽州來參白言佛說三乘法又云最上乘弟子不解願賜慈悲祖告之曰見聞轉讀是小乘悟法解義是中乘依法修行是大乘識自本心見自本性萬法盡通萬行俱備一切不除離諸見相念念無住是最上乘普燈錄般若多羅云我佛從兜率天入摩耶胎中直與三十三人總授玄記云吾有心法總付於汝各各候時當一人傳一人密護宗旨勿令斷絕謂之教外別傳由是頌曰摩耶肚裏堂法界體一如卅三諸祖師同時密授記付法藏傳教者不倫有三疇類一顯教者諸乘經律論也二密教者瑜伽灌頂五部護摩三密曼拏羅法三心教者直指人心見性成佛禪法也次一法輪即顯教也以摩騰為始祖焉次二教令輪者即密教也以金剛智為始祖焉次三心輪者以菩提達磨為始祖焉是故傳法輪者以法音傳法音傳教令輪者以秘密傳秘密傳心輪者以心傳心此之三教三輪三祖自西而東化凡而聖流十五代僧史略按智度論云諸佛斷法愛亦不立經書亦不莊嚴語言則大聖其意何甞必在於教乎又經云修多羅教如標月指若復見月了知所標畢竟非月此豈使人執教跡耶又經云始從鹿野苑終至跋提河於是二中間未曾說一字斯固教外別傳之謂也正宗記爾時釋迦不是禪化主也言此宗行化主佛非舍那非釋迦而能作舍那能作釋迦非十身非三身而能作十身能作三身所以噵法中王只這是一體三身不相似自有靈光照古今何必𮌎前題卍字辨宗記且夫教外別傳即佛佛祖祖所共法也以是法非文字所可擬議故曰教外以不歷位次階級而悟佛心宗徑受法印故曰別傳教也者自有言至於無言者也心也者自無言至於無言者也自無言而至於無言則人莫得而名焉故強名曰禪世人不知其由或謂學而可知思而可得習而可成謂之禪那此云靜慮靜慮者澄神端坐息緣束心助成觀慧之一法耳何故世尊於垂滅之時而密傳於迦葉以至三十三世累累而不絕乎是故達磨所傳者非借教習禪者也乃直指人心見性成佛之道也祖門刊正錄唐土第五祖弘忍大師召第六祖惠能大師告曰諸佛出世為一大事故隨機小大而引導之遂有十地三乘頓漸等旨以為教門然以無上微妙秘密圓明真實正法眼藏付于上首大迦葉尊者展轉傳授二十八世至達磨屆于此土得可大師承襲以至于吾今以法寶及所傳袈裟用付於汝善自保護無令斷絕傳燈錄諸佛說弓祖師說絃說絃者禪門正傳玄路不借言說直示宗本心體如弓之絃若教門則一乘是直路三乘是曲路不如直舉宗本心體示於心念之中何故一乘教中所說者事事無礙法界圓融此事事無礙法界方歸一味法界拂此一味法界之跡方現祖師所示一心故知諸教不直順德禪師錄十佛壇場一海印三種世間總在焉無盡性海合一味一味相沈是我禪真淨文和尚頌世之文字法師見禪者排斥佛教實謂非經至乃毛竪只怪禪者排斥佛教不見禪者洗光佛日予難其此說教有明文云非聲聞乘非緣覺乘非菩薩乘亦非佛乘是先祖相承底最上上禪問曰宜以何等語形容此法門答曰僧問趙州祖師西來意旨云庭前栢樹子此一句龍宮海藏所未有底寂音尊者錄僧問別傳之法起於何時答曰佛涅槃之時慮未來眾生但依經言不解佛意如貧人數他珍寶終無所利由是世尊開青蓮目顧視迦葉對眾密付延壽禪師錄問達磨對楊衒之曰明佛心宗寸無差誤行解相應名之曰祖何現聲聞之跡得傳教外之心耶答引接小乘之機權作聲聞之相教外別傳之日非是聲聞之智禪林集評曰唐神清不喜禪者乃著書而抑之曰其傳法賢聖間以聲聞如迦葉等雖則迴心尚為小智豈能傳佛心印乎固哉清也徒肆己之愛惡而不知大聖若傳法者雖示同聲聞而豈宜以聲聞盡之哉豈非應化佛所化出羅漢耶佛所化者宜其所有四禪三昧無量功德與如來不異也不異如來而傳佛心印孰謂不然乎正宗記真性即不垢不淨凡聖無差禪則有淺有深階降差殊謂帶異計忻上厭下而修者是外道禪正信因果亦以忻厭而修者是凡夫禪悟我空偏真之理而修者是小乘禪悟我法二空所現真理而修者是大乘禪若頓悟自心本來清淨元無煩惱無漏智性本自具足此心即佛畢竟無異依此而修者是最上乘禪亦名如來清淨禪達磨門下展轉相傳者是此禪也又云以心傳心者是達磨大師之言也因可和尚次問此法有何文字教典習學大師答云我法以心傳心不立文字謂因師說而不以文句為道須亡詮得意得意即是傳心禪門離念無念亦是此中拂跡遮過但以心傳心密意授受之處非今簡牘所論也圭峰禪源諸詮集序及本錄有人問大珠禪師弟子未知律師法師禪師何者最勝師曰夫律師者戒毗尼之法藏傳壽命之遺風洞持犯而達開遮秉威儀而行軌範牒三番羯磨作四果初因夫法師者踞師子之座瀉懸河之辨對稠人廣眾啟鑿玄關開般若妙門等三輪空施夫禪師者撮其樞要直了心源出沒卷舒縱橫應物咸均事理頓見如來拔生死深根獲現前三昧若不安禪靜慮到這裏總須茫然其人禮謝而退大珠惠海禪師錄謬會真規之眾侶錯傳上祖之嗣承或謂頓漸之門以為正脉又舉圓頓之教將作宗乘性海自體雖不可說事相永寂而修法界之因以證法界之果故云因果域內若舉宗門密傳妙旨本無法界之因亦無法界之果亦無智證亦無依正本無因故無修萬行之路本無果故亦無證果之門問若約海印自是證體離因離果與禪門正宗心印如何和會答相似而不相似何謂也所言海印者促因果處歸亡因果處有因始跡有果終跡若論當時雖無因果而推本則有因有果若約禪所以則本無法界之因更無亡因本無法界之果更無亡果豈可亡因果之後歸無因果處哉所以古德云禪祖傳心處如鳥飛空等問頓教中一切法離心緣相離能念所念一一法法純純無雜唯如如功德故無能入者抑亦清淨解脫何故與禪門不同答諸佛境界本自離念念起故眾生眾生若一念不生即同諸佛又初地即佛地三賢十聖猶如空中鳥跡若論所證真如離言離相泯絕無寄故若不洞明前解無以攝成此行行即忘機行也然則有所證真如有能證智體有所不生妄念有所生正念雖寂滅無次第階級而有從信至佛地佛地即信位若論禪門本無一念不生何念念既本無信位何立信位不立佛地何有相念不見離是何相名字本無離何名字故不同頓教忘情契理有二義一依教契理者如大乘菩薩佛說小乘不滯小乘雖說大乘不滯大乘說理說事不滯理事說空說色不滯空色說真說俗不滯真俗五乘諸法一一字一一句不壞假名圓融融會二依禪契理者佛說大乘本無大乘佛說小乘本無小乘佛說理事本無理事乃至三乘十二分教三界所有法如鳥飛空永無蹤跡如華嚴疏云圓頓之上別有一宗此亡詮會旨之宗或問亡何詮會何旨答亡五教之詮會五教之旨禪宗是也玄覺禪師教外竪禪章或問禪經是小乘之經不當預祖門之道楞伽是性宗之法兼有說云是達摩帶來要證據心地法門此乃臨終分付可乎答此亦不可也此經是單喻經立楞伽山為喻者意謂此山高峻以生死大海隔諸眾生及二乘人等故文云非得通菩薩不能登此山但與大惠等諸菩薩談佛性義意欲激發二乘之人令其捨小慕大耳備機不足故止可在方等部中又安可證據祖門耶問祖門既非禪經為宗又非楞伽為宗今立般若為宗可乎答亦不可也何哉我先覺父涅槃會中只云吾有正法眼藏付囑摩訶迦葉不聞吾有摩訶般若付囑摩訶迦葉梵語般若此云智惠若是智惠是舍利弗為宗主也為般若已前所說法皆為戲論故經云蠲除諸法戲論之糞當知般若是聲聞齩癥破塊之大藥耳安可謂禪門之宗主也問禪經與楞伽般若或教理未圓備機不足故與祖門異耳華嚴以塵塵剎剎顯見毗盧遮那清淨妙身楞嚴以妙性圓明普示含識法華是一乘微妙該攝具周如何祖師之門復有別傳之事答我釋迦氏之說教也以等慈心普視含識在生死海或漂或流隨其高下而濟渡之就其海中張羅𮊁網或圍或箔若竿若鈎其魚有大者曰鼇曰鯨即入大網之內或魴或鱒即投中網之中至於蟹蜆蚌螺遂用小網撈摝盡使出煩惱海上涅槃山一切含識咸皆受渡中有一物鬣如朱火爪似剛鈎眼射日光口吐煙氣忽因出窟見此梁筌網交羅張捕之具將身一展舉爪略拏則見白浪滔天黑風蔽日方當半晝斗覺晦冥俱是梁一時漂蕩然後却在雲端之內注甘露雨潤益生靈當知我祖門之人有如此事鑑昭禪師引古辨今錄問有舌無舌其義云何答仰山云有舌土者即是佛土是故應機門無舌土者即是禪是故正傳門問如何是應機門答知識揚眉動目而示法此皆為應機門故有舌況語言也問如何是無舌土答禪根人是此中無師無弟也問若然者何故古人云師資相傳耶答章敬云喻如虗空以無相為相以無為為用禪傳者亦然以無傳為傳故傳而不傳也問無舌土中不見能化所化者與教門如來證心中亦不見能化所化云何別耶答教門之至極如來證心名曰海印定三種世間法印現而永無解是則有三種世間跡也今祖代法者等閑道人心裏永不生淨穢兩草故不荒三種世間草亦無出入跡所以不同也淨則真如解脫等法穢則生死煩惱等法也所以古人云行者心源如深水淨穢兩草永不生又佛土者前服定惠之衣入燃燈穴內今放却定惠之衣立玄地故有蹤跡祖土者本來無脫不脫不著一條線故與佛土大別也海東無染國師無舌土論無染國師問法性禪師教禪何別答百僚阿衡各能其職帝王默廟堂之上萬姓以安無染國師行狀溟州崛山梵日國師答羅代真聖大王宣問禪教兩義云我本師釋迦出胎說法各行七步云唯我獨尊後踰城往雪山中因星悟道既知是法未臻極遊行數十月尋訪袒師真歸大師始傳得玄極之旨是乃教外別傳也故聖住和尚常扣楞伽經知非祖宗捨了却入唐傳心道允和尚披究華嚴經乃曰圓頓之旨豈如心印之法亦入唐傳心此乃非其根本能信之別旨耳海東七代錄重峰祖師澄觀禪師入唐嗣長慶稜和尚還國後答光宗大王宣問禪法之源曰此事從釋迦已前禪教門逈別矣而達磨大師來唐土親傳惠可而觀之僧那禪師不得祖宗法以愚惑情將欲破滅祖宗正法故假設方便謂金剛楞伽是我心要付惠可兼傳之因此未究禪旨泛參浮議禪教僧或生輕違心海東七代錄
