front:
  text: 禪門寶藏録序羌夫我迦文老人禪燈點迦葉之心教海瀉阿難之口則禪之與教異日噵也決矣而職教者聞教外別傳之說則面青眼白云惡是何言歟噫人我之大一至於斯也故走慨然賈勇不揆蠡測管窺而以三門質之三門者何混濫者禪教也故上之卷立禪教對辨門毀謗者諸講也故中之卷立諸講歸伏門流通者君臣也故下之卷立君臣崇信門此三門所引皆古重言也非臆說也非臆說則人信之者儻有焉目之為禪門寶藏云海東沙門內願堂真靜大禪師天頙蒙旦序至元三十年癸巳十一月日也目次上卷禪教對辨門二十五則中卷諸講歸伏門二十五則下卷君臣崇信門三十九則
